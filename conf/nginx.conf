user root;
# 1. Usa todos los núcleos disponibles para repartir la carga del SSL
worker_processes auto; 

pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    # Aumentamos conexiones para aguantar benchmarks pesados
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # 2. Optimizaciones de red
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    
    # Mantenemos la conexión abierta para que 'ab -k' funcione
    keepalive_timeout  65;
    keepalive_requests 1000;

    # 3. Caché de Sesiones SSL (VITAL para no repetir el handshake caro)
    # Guarda 10MB de sesiones (aprox 40,000 sesiones) durante 10 minutos
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    # Desactivamos tickets de sesión para forzar el uso de la caché compartida más rápida
    ssl_session_tickets off;

    access_log /dev/stdout;

    server {
        listen 443 ssl;
        server_name localhost;

        # Certificados
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        
        # 4. Protocolos rápidos (TLSv1.3 es mucho más veloz en el handshake)
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers         'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.wasm$ {
            add_header Content-Type application/wasm;
        }

        # Tu módulo de C
        location /api {
            hola_mundo_dispatcher; 
        }
    }

    # Servidor HTTP para pruebas de benchmark sin SSL (Velocidad Pura)
    server {
        listen 80;
        server_name localhost;
        
        location /api {
            hola_mundo_dispatcher;
        }

        # Descomenta la línea de abajo solo cuando termines tus tests
        # return 301 https://$host$request_uri;
    }
}